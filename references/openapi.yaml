          description: Failed to remove cron job from the server
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /sites/{uuid}/cron-jobs/{cronJobUuid}/execute:
    post:
      tags: [Sites]
      summary: Execute Site Cron Job
      description: >
        Triggers the cron command now. The command is launched in the
        background (detached over SSH) and returns 202 immediately, so
        long-running cron jobs do not time out the request. Retrieve the
        result via the cron-job output endpoint once it finishes. Requires
        the `write:sites` scope and the `server:cron-job` permission.
      operationId: sites.cron-jobs.execute
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
        - name: cronJobUuid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "202": { description: Cron job execution started, content: { application/json: { schema: { $ref: "#/components/schemas/SuccessEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Cron job failed to launch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /sites/{uuid}/cron-jobs/{cronJobUuid}/output:
