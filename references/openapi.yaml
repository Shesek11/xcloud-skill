        site_uuid:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        core:
          type: object
          properties:
            current_version: { type: string, nullable: true, example: "6.4.2" }
            available_version: { type: string, nullable: true, example: "6.5.0" }
            update_available: { type: boolean, example: true }
            is_security_update: { type: boolean, example: false }
        plugins:
          $ref: "#/components/schemas/WordPressUpdatesGroup"
        themes:
          $ref: "#/components/schemas/WordPressUpdatesGroup"
        summary:
          type: object
          properties:
            total_pending: { type: integer, example: 7 }
            security_pending: { type: integer, example: 1 }
            last_scanned_at:
              type: string
              format: date-time
              nullable: true
              example: "2026-05-06T12:00:00Z"

    WordPressUpdatesGroup:
      type: object
      properties:
        total: { type: integer, example: 23 }
        active: { type: integer, example: 18 }
        with_updates: { type: integer, example: 5 }
        with_security_updates: { type: integer, example: 1 }
        items:
          type: array
          items:
            type: object
            properties:
              slug: { type: string, example: woocommerce }
              name: { type: string, example: WooCommerce }
              current_version: { type: string, nullable: true, example: "8.5.2" }
              available_version: { type: string, nullable: true, example: "8.6.0" }
              is_security_update: { type: boolean, example: true }

    WordPressStatus:
      type: object
      properties:
        wordpress_version:
          type: string
          nullable: true
          example: "6.4.2"
        php_version:
          type: string
          nullable: true
          example: "8.2"
        multisite_enabled:
          type: boolean
          example: false
        wp_debug_enabled:
          type: boolean
          example: false
        wp_cron_enabled:
          type: boolean
          example: true
        checksum_status:
          type: string
          nullable: true
          example: passed
        last_checksum_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-06T08:00:00Z"
        items_count:
          type: object
          properties:
            plugins: { type: integer, example: 23 }
            themes: { type: integer, example: 3 }
            core: { type: integer, example: 1 }
        updates_pending:
          type: object
          properties:
            core: { type: boolean, example: false }
            plugins: { type: integer, example: 5 }
            themes: { type: integer, example: 1 }
        ssl:
          type: object
          properties:
            enabled: { type: boolean, example: true }
            provider:
              type: string
              nullable: true
              example: xcloud
            expires_at:
              type: string
              format: date-time
              nullable: true
              example: "2026-08-12T00:00:00Z"

    Vulnerability:
      type: object
      required: [uuid, slug, title, type, severity, source, ignored]
      properties:
        uuid:
          type: string
          description: >
            Stable identifier. For Wordfence entries this is the Wordfence
            advisory UUID. For Patchstack entries this is a synthetic
            xCloud-generated identifier (`patchstack-<slug>-<id>`).
          example: 8c5d7e8a-1234-4abc-9def-1234567890ab
        slug:
          type: string
          example: woocommerce
        title:
          type: string
          example: WooCommerce <= 8.4 Reflected XSS
        type:
          type: string
          enum: [plugin, theme, core, unknown]
          example: plugin
        severity:
          type: string
          enum: [critical, high, medium, low, unknown]
          example: high
        cvss:
          type: number
          format: float
          nullable: true
          example: 7.5
        current_version:
          type: string
          nullable: true
          example: 8.3.1
        affected_versions:
          type: array
          nullable: true
          items: { type: string }
          example: ["<8.5.0"]
        patched_versions:
          type: array
          nullable: true
          items: { type: string }
          example: [">=8.5.0"]
        remediation:
          type: string
          nullable: true
          example: Update WooCommerce to 8.5.0 or later.
        cwe:
          type: string
          nullable: true
          example: CWE-79
        source:
          type: string
          enum: [patchstack, wordfence]
          example: wordfence
        ignored:
          type: boolean
          example: false
        detected_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-04T10:32:11Z"

    VulnerabilitySiteContext:
      type: object
      required: [uuid, name]
      properties:
        uuid:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        name:
          type: string
          example: example-com

    VulnerabilitiesSummary:
      type: object
      required: [total, by_severity, by_source]
      properties:
        total:
          type: integer
          example: 12
        by_severity:
          type: object
          properties:
            critical: { type: integer, example: 2 }
            high: { type: integer, example: 4 }
            medium: { type: integer, example: 5 }
            low: { type: integer, example: 1 }
            unknown: { type: integer, example: 0 }
        by_source:
          type: object
          properties:
            patchstack: { type: integer, example: 3 }
            wordfence: { type: integer, example: 9 }

    VulnerabilityCount:
      type: object
      description: >
        Flat severity counts for the site from a single source (Patchstack
        preferred over Wordfence, only `insecure` detections), with severity
        derived from the vulnerability score. `total` is the sum of
        critical/high/medium/low; `skipped` is the count of ignored detections
        and is reported separately (not included in `total`).
      required: [critical, high, medium, low, skipped, total]
      properties:
        critical:
          type: integer
          example: 0
        high:
          type: integer
          example: 2
        medium:
          type: integer
          example: 4
        low:
          type: integer
          example: 0
        skipped:
          type: integer
          example: 0
        total:
          type: integer
          example: 6

    VulnerabilityIgnoreResult:
      type: object
      required: [vulnerability, site]
      properties:
        vulnerability:
          type: object
          required: [uuid, source, ignored]
          properties:
            uuid:
              type: string
              format: uuid
              example: 8c5d7e8a-1234-4abc-9def-1234567890ab
            source:
              type: string
              enum: [wordfence, patchstack]
              example: wordfence
            slug:
              type: string
              nullable: true
              example: woocommerce
            ignored:
              type: boolean
              example: true
        site:
          type: object
          properties:
            uuid: { type: string, format: uuid }
            name: { type: string }

    PagespeedRun:
      type: object
      required: [uuid, strategy, status]
      properties:
        uuid:
          type: string
          format: uuid
          example: 8c5d7e8a-1234-4abc-9def-1234567890ab
        strategy:
          type: string
          enum: [mobile, desktop]
          example: mobile
        status:
          type: string
          enum: [pending, scanning, completed, failed]
          example: completed
        scores:
          type: object
          description: Lighthouse category scores (0–100).
          properties:
            performance: { type: integer, example: 92 }
            accessibility: { type: integer, example: 88 }
            best_practices: { type: integer, example: 95 }
            seo: { type: integer, example: 100 }
        core_web_vitals:
          type: object
          description: Core Web Vitals — LCP, CLS, INP, FCP.
          properties:
            lcp:
              type: object
              properties:
                value: { type: number, example: 2.1 }
                unit: { type: string, example: s }
                rating: { type: string, enum: [good, needs-improvement, poor], example: good }
            cls:
              type: object
              properties:
                value: { type: number, example: 0.05 }
                unit: { type: string, example: "" }
                rating: { type: string, enum: [good, needs-improvement, poor], example: good }
            inp:
              type: object
              properties:
                value: { type: number, example: 150 }
                unit: { type: string, example: ms }
                rating: { type: string, enum: [good, needs-improvement, poor], example: good }
            fcp:
              type: object
              properties:
                value: { type: number, example: 1.2 }
                unit: { type: string, example: s }
                rating: { type: string, enum: [good, needs-improvement, poor], example: good }
        insights:
          type: array
          items: { type: object }
        diagnostics:
          type: array
          items: { type: object }
        analyzed_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-06T08:00:00Z"
        created_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-06T08:00:30Z"

    WordPressUpdateRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [plugin, theme, core]
          example: plugin
        slugs:
          type: array
          description: >
            Optional list of `item_name` values to update. If omitted, every
            updatable item of the requested type is queued.
          items: { type: string }
          example: ["woocommerce", "yoast-seo"]
        backup_before_update:
          type: boolean
          default: false
          description: >
            When true and the site has remote (cloud) backup settings configured,
            a pre-update backup is taken before the update runs.

    WordPressUpdateOperation:
      type: object
      required: [operation, queued_items, skipped_items, backup_before_update]
      properties:
        operation:
          type: object
          required: [uuid, status, operation_type]
          properties:
            uuid:
              type: string
              format: uuid
              example: 8c5d7e8a-1234-4abc-9def-1234567890ab
            status:
              type: string
              enum: [queued, running, completed, failed]
              example: queued
            operation_type:
              type: string
              example: update
        queued_items:
          type: array
          items:
            type: object
            required: [slug, type]
            properties:
              slug: { type: string, example: woocommerce }
              title: { type: string, example: WooCommerce }
              type: { type: string, enum: [plugin, theme, core], example: plugin }
              current_version: { type: string, nullable: true, example: "8.3.1" }
              available_version: { type: string, nullable: true, example: "8.5.0" }
        skipped_items:
          type: array
          items:
            type: object
            required: [slug, reason]
            properties:
              slug: { type: string, example: yoast-seo }
              reason:
                type: string
                enum: [no_update_available, already_updating]
                example: no_update_available
        backup_before_update:
          type: boolean
          example: false

    WordPressActivateRequest:
      type: object
      required: [type, slugs]
      properties:
        type:
          type: string
          enum: [plugin, theme]
          example: plugin
        slugs:
          type: array
          minItems: 1
          description: List of `item_name` values to activate (required).
          items: { type: string }
          example: ["woocommerce", "akismet"]
        backup_before_action:
          type: boolean
          default: false
          description: >
            When true and the site has backup settings configured, a pre-action
            backup is taken before the activation runs.

    WordPressToggleOperation:
      type: object
      required: [operation, queued_items, skipped_items, backup_before_action]
      properties:
        operation:
          type: object
          required: [uuid, status, operation_type, action]
          properties:
            uuid:
              type: string
              format: uuid
              example: 8c5d7e8a-1234-4abc-9def-1234567890ab
            status:
              type: string
              enum: [queued, running, completed, failed]
              example: queued
            operation_type:
              type: string
              example: toggle
            action:
              type: string
              enum: [activate, deactivate]
              example: activate
        queued_items:
          type: array
          items:
            type: object
            required: [slug, type]
            properties:
              slug: { type: string, example: woocommerce }
              title: { type: string, example: WooCommerce }
              type: { type: string, enum: [plugin, theme], example: plugin }
        skipped_items:
          type: array
          items:
            type: object
            required: [slug, reason]
            properties:
              slug: { type: string, example: akismet }
              reason:
                type: string
                enum:
                  - already_active
                  - must_use_cannot_activate
                  - dropin_cannot_activate
                  - core_not_toggleable
                  - cannot_activate
                example: already_active
        backup_before_action:
          type: boolean
          example: false

    WpDebugRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Set to true to enable WP_DEBUG, false to disable.
          example: true

    MagicLoginResult:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: >
            Short-lived URL that logs the WordPress admin in without a
            password. Open in a browser to land on /wp-admin. Valid for
            10 minutes from creation.
          example: "https://example.com/wp-admin/wp-login.php?xcloud_magic_login_token=eyJ...&auth_token=Xa3p9q&v=1742212211"
        expires_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp at which the URL stops being valid.
          example: "2026-05-20T14:50:00Z"
        admin_user:
          type: string
          description: >
            WordPress username that the URL will log in as. Equals the
            site's admin user unless `login_as` was passed.
          example: admin

    
