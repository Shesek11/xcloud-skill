  # ---------------------------------------------------------------------------
  # Sites — Read
  # ---------------------------------------------------------------------------

  /sites:
    get:
      tags: [Sites]
      summary: List Sites
      description: >
        Returns a paginated list of all sites across all your servers.
        Requires the `read:sites` scope.
      operationId: sites.index
      security:
        - bearerAuth: []
      parameters:
        - name: status
