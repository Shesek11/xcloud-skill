          description: List of staging sites belonging to the production site
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/StagingSiteList"
              example:
                success: true
                message: Staging sites retrieved successfully.
                data:
                  items:
                    - uuid: "aa11bb22-cc33-4444-5555-66778899aabb"
