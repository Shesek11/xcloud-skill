                    configured: true
                    active: true
                    status: completed
                    last_backup_at: "2026-05-15T02:00:00Z"
                  remote:
                    configured: true
                    active: false
                    status: completed
                    last_backup_at: "2026-05-14T02:00:00Z"
                    storage_provider:
                      uuid: "f8e7d6c5-b4a3-9281-7e6f-5d4c3b2a1f0e"
                      provider: s3
                      status: connected
        "401":
