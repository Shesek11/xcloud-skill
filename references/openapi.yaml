                  authentication_mode: public_key
                  ssh_keypairs:
                    - uuid: e5f6a7b8-c9d0-1234-efab-567890123456
                      name: deploy-key
                      fingerprint: "SHA256:AbCdEf1234567890exampleFingerprint"
                    - uuid: f6a7b8c9-d0e1-2345-fabc-678901234567
                      name: ci-key
                      fingerprint: "SHA256:GhIjKl0987654321exampleFingerprint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Sites]
      summary: Update SSH/SFTP Config
      description: >
        Updates the SSH/SFTP authentication configuration for the site. When
        `authentication_mode` is `public_key`, provide `ssh_public_keys`. When
        `authentication_mode` is `password`, provide `password`. This is an
        asynchronous operation. Requires the `write:sites` scope.
      operationId: sites.ssh.update
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSshRequest"
            examples:
              public_key_auth:
                summary: Switch to public-key authentication
                value:
                  authentication_mode: public_key
                  ssh_public_keys:
                    - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExample deploy@workstation"
                    - "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQExample ci@pipeline"
              password_auth:
                summary: Switch to password authentication
                value:
                  authentication_mode: password
                  password: "Str0ngP@ssw0rd!"
      responses:
        "200":
          description: SSH/SFTP configuration updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SshConfig"
              example:
                success: true
                message: SSH config updated successfully.
                data:
                  site_user: xcloud_example
                  authentication_mode: public_key
                  ssh_keypairs:
                    - uuid: e5f6a7b8-c9d0-1234-efab-567890123456
                      name: deploy-key
                      fingerprint: "SHA256:AbCdEf1234567890exampleFingerprint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

