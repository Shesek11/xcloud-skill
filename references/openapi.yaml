    RedirectionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Redirection"
        count:
          type: integer
          example: 1

    SslCertificate:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: "5d5a3c5e-3c5e-4a5e-9d5a-3c5e3c5e3c5e"
        provider:
          type: string
          enum: [xcloud, custom, staging, cloudflare, cloudflare_multi_domain]
          example: xcloud
        status:
          type: string
          enum: [new, obtained, installed, failed, revoked]
          example: installed
        obtained_from:
          type: string
          nullable: true
          description: Issuing authority where the certificate was obtained (e.g. letsencrypt).
          example: letsencrypt
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-08-10T00:00:00Z"
        renewal_attempt_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent renewal attempt.
          example: "2026-05-10T03:00:00Z"
        hostnames:
          type: array
          items:
            type: string
          example: ["example.com", "www.example.com"]
        is_installed:
          type: boolean
          description: True when the certificate is currently installed on the server.
          example: true
        site:
          type: object
          description: Present on `GET /ssl-certificates/{uuid}` (returns the parent site); omitted from `GET /sites/{uuid}/ssl-certificates` list responses since they are already site-scoped.
          properties:
            uuid:
              type: string
              format: uuid
              example: "11aa22bb-33cc-44dd-55ee-66ff77aa88bb"
            name:
              type: string
              example: example.com
        created_at:
          type: string
          format: date-time
          nullable: true
          example: "2025-12-10T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-10T03:00:00Z"

    SslCertificateList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SslCertificate"
        count:
          type: integer
          example: 1

    SslCertificateStatus:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: "5d5a3c5e-3c5e-4a5e-9d5a-3c5e3c5e3c5e"
        provider:
          type: string
          nullable: true
          enum: [xcloud, custom, cloudflare, cloudflare_multi_domain, staging]
          example: xcloud
        status:
          type: string
          nullable: true
          enum: [new, obtained, installed, failed, revoked]
          example: obtained
        label:
          type: string
          example: Installed
        is_installed:
          type: boolean
          description: True when the certificate is installed and serving HTTPS (`status` is `obtained` or `installed`).
          example: true
        is_in_progress:
          type: boolean
          description: True when the certificate is still being generated (`status=new`).
          example: false
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-08-10T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-10T03:00:00Z"

    CreateSslCertificateRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          enum: [xcloud, custom, cloudflare]
          description: SSL provider. `cloudflare` maps server-side to the multi-domain CF architecture.
          example: xcloud
        certificate:
          type: string
          description: PEM-encoded certificate body. Required when `provider=custom`.
          example: "-----BEGIN CERTIFICATE-----\nMIID...\n-----END CERTIFICATE-----"
        private_key:
          type: string
          description: PEM-encoded private key. Required when `provider=custom`.
          example: "-----BEGIN PRIVATE KEY-----\nMIIE...\n-----END PRIVATE KEY-----"
        force:
          type: boolean
          default: false
          description: "When the site already has an SSL provider configured, `force: true` is required to switch to a different provider. Ignored when no existing provider is set or the requested provider matches."
          example: false
        ssl_search_replace:
          type: boolean
          default: false
          description: WordPress only — when true, the site's HTTPS rollout will include a DB search-replace from `http://` to `https://`. Silently ignored on non-WordPress sites.
          example: false

    CreateSslCertificateResponse:
      type: object
      properties:
        site:
          type: object
          properties:
            uuid:
              type: string
              format: uuid
              example: "11aa22bb-33cc-44dd-55ee-66ff77aa88bb"
            name:
              type: string
              example: example.com
        certificate_uuid:
          type: string
          format: uuid
          nullable: true
          description: "UUID of the new certificate row. Populated for `xcloud` and `custom` providers (row created synchronously). Null for `cloudflare`, where the row is created by the background job after the Cloudflare API call returns; clients can fetch the new uuid via `GET /sites/{uuid}/ssl-certificates` after a short poll."
          example: "5d5a3c5e-3c5e-4a5e-9d5a-3c5e3c5e3c5e"
        provider:
          type: string
          enum: [xcloud, custom, cloudflare]
          description: Echoes the provider requested.
          example: xcloud
        previous_provider:
          type: string
          nullable: true
          description: "The site's previously configured SSL provider, or null if none. Useful when switching providers with `force: true`."
          example: cloudflare
        status:
          type: string
          enum: [queued]
          example: queued

    DomainInfo:
      type: object
