        fingerprint:
          type: string
          example: "SHA256:AbCdEf1234567890exampleFingerprint"
        created_at:
          type: string
          format: date-time
          nullable: true
          example: "2025-12-10T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          example: "2025-12-10T00:00:00Z"

