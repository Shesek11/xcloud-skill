  /sites/{uuid}/git:
    get:
      tags: [Sites]
      summary: Get Git Repository Info
      description: >
        Returns the connected git repository configuration for the site.
        Private keys are never returned. Requires the `read:sites` scope.
      operationId: sites.git
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "200":
          description: Git repository configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GitInfo"
              example:
                success: true
                message: Git info retrieved successfully.
                data:
                  repository: github.com/myorg/my-wp-theme
                  branch: main
                  provider: github
                  push_deploy_enabled: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Sites]
      summary: Update Git Deployment Settings
      description: >
        Updates the git deployment configuration for a git-deployed site:
        tracked `git_branch`, the push-to-deploy webhook toggle
        (`enable_push_deploy`), whether the deploy script runs after each pull
        (`run_after_deployment`), the post-pull `deploy_script`, a custom
        `git_pull_script`, an optional `restart_services` flag, and the
        site-relative `env_file_path`. Changing the branch is validated against
        the connected provider (or a live SSH check) before saving. Sensitive
        keys are never returned. Requires the `write:sites` scope and the
        `site:manage-update` permission.
      operationId: sites.git.update
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [git_branch, run_after_deployment]
              properties:
                git_branch:
                  type: string
                  maxLength: 255
                  example: main
                enable_push_deploy:
                  type: boolean
                  description: Enable the push-to-deploy webhook.
                  example: true
                run_after_deployment:
                  type: boolean
                  description: Run the deploy script after each pull.
                  example: true
                deploy_script:
                  type: string
                  nullable: true
                  description: Required when run_after_deployment is true.
                  example: "composer install --no-dev\nphp artisan migrate --force"
                git_pull_script:
                  type: string
                  nullable: true
                  description: Custom git-pull script (overrides the default).
                  example: "git pull origin main"
                restart_services:
                  type: boolean
                  nullable: true
                  example: false
                env_file_path:
                  type: string
                  nullable: true
                  maxLength: 255
                  description: Site-relative directory for the .env file (no leading/trailing slash).
                  example: app
      responses:
        "200":
          description: Updated git deployment settings (sensitive keys stripped)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GitInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: >
            Not a git-deployed site, validation failed, or the branch could not
            be validated against the repository.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /sites/{uuid}/git/deploy:
    post:
      tags: [Sites]
      summary: Trigger Git Deployment
      description: >
        Queues a manual pull-and-deploy for a git-deployed site. Returns 202
        immediately; poll `GET /sites/{uuid}/deployment-logs` or
        `/sites/{uuid}/events` for progress. Requires the `write:sites` scope
        and the `site:manage-update` permission.
      operationId: sites.git.deploy
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "202":
          description: Deployment queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
              example:
                success: true
                message: Site deployment queued
                data: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: The site is not a git-deployed site.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

