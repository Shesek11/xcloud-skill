  # ---------------------------------------------------------------------------
  # Sites — Write
  # ---------------------------------------------------------------------------

  /sites/{uuid}/backup:
    post:
      tags: [Sites]
      summary: Trigger Backup
      description: >
        Initiates an on-demand backup of the site. This is an asynchronous
        operation — poll `GET /sites/{uuid}/events` to track completion.
        `type` selects the destination: `local` (default) or `remote`. A
        remote backup requires a configured storage provider with a working
        connection; if it is missing or unreachable the request is rejected
        with 422 before anything is queued. Requires the `write:sites` scope.
      operationId: sites.backup
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [local, remote]
                  default: local
                  description: Backup destination. Defaults to `local`.
                  example: remote
      responses:
        "200":
          description: Backup started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
              example:
                success: true
                message: Backup started successfully
                data: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: >
            Backups are not supported for this site type, the `type` value is
            invalid, or (for `remote`) no storage provider is configured or the
            provider connection failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /sites/{uuid}/rescue:
    post:
      tags: [Sites]
      summary: Rescue Site
      description: >
        Queues a site rescue job with the selected repair options. Supported options depend on
        the site type and server stack. Poll `GET /sites/{uuid}/events` to track completion.
        Requires the `write:sites` scope.
      operationId: sites.rescue
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isolate_user:
                  type: boolean
                  description: Repair the site user. Unsupported for OpenClaw sites.
                directory_permissions:
                  type: boolean
                  description: Reset site directory permissions. Unsupported for OpenClaw sites.
                regenerate_nginx:
                  type: boolean
                  description: Regenerate the site web server configuration.
                restart_nginx:
                  type: boolean
                  description: Restart nginx after regenerating config. Requires regenerate_nginx and is unsupported for OpenLiteSpeed/OpenClaw sites.
                reinstall_php:
                  type: boolean
                  description: Repair the site's PHP runtime. Unsupported for Node sites and Docker nginx stacks.
                repair_node:
                  type: boolean
                  description: Repair the site's Node runtime. Supported for Node-based sites, including OpenClaw.
                repair_pm2:
                  type: boolean
                  description: Repair the PM2 process and ecosystem config. Unsupported for static Node sites and OpenClaw sites.
                restart_pm2:
                  type: boolean
                  description: Restart the PM2 process. Unsupported for static Node sites and OpenClaw sites.
                repair_openclaw:
                  type: boolean
                  description: Run the OpenClaw-specific repair flow. Supported only for OpenClaw sites.
            example:
              isolate_user: true
              directory_permissions: true
              reinstall_php: true
              regenerate_nginx: true
              restart_nginx: true
      responses:
        "202":
          description: Rescue queued successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          site_uuid:
                            type: string
                            format: uuid
                          requested_options:
                            type: object
                            additionalProperties:
                              type: boolean
                          supported_options:
                            type: array
                            items:
                              type: string
              example:
                success: true
                message: Site rescue job has been queued.
                data:
                  site_uuid: b2c3d4e5-f6a7-8901-bcde-f12345678901
                  requested_options:
                    isolate_user: true
                    directory_permissions: true
                    regenerate_nginx: true
                    restart_nginx: true
                    reinstall_php: true
                    repair_node: false
                    repair_pm2: false
                    restart_pm2: false
                    repair_openclaw: false
                  supported_options:
                    - isolate_user
                    - directory_permissions
                    - regenerate_nginx
                    - restart_nginx
                    - reinstall_php
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/custom-nginx:
    get:
      tags: [Sites]
      summary: List Custom Nginx Configs
      description: >
        Returns custom nginx configuration snippets attached to a
        site. Nginx-only — on non-nginx stacks (OpenLiteSpeed) the
        list is naturally empty since these rows are never created.
        Requires the `read:sites` scope.
      operationId: sites.customNginx
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "200":
          description: List of custom nginx configurations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CustomNginxList"
              example:
                success: true
                message: Custom nginx configs retrieved successfully.
                data:
                  items:
                    - uuid: "44ee55ff-66aa-77bb-88cc-99dd00ee11ff"
                      template: "Hide My WP"
                      file: "hide-my-wp"
                      type: server
                      content: "# nginx snippet body"
                      status: applied
                      created_at: "2026-02-01T00:00:00Z"
                      updated_at: "2026-02-01T00:00:00Z"
                  count: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /sites/{uuid}/web-rules:
    get:
      tags: [Sites]
      summary: List Web Rules
      description: >
        Returns the custom web-server rules attached to a site: HTTP
        header rules (set or unset response headers) and redirect rules
        (with optional conditions on host, URI, query arg, or device).
        Returned in render order (sort_order) then newest-first.
        Requires the `read:sites` scope.
      operationId: sites.webRules
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "200":
          description: List of web rules
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WebRuleList"
              example:
                success: true
                message: Web rules retrieved successfully.
                data:
                  items:
                    - uuid: "11aa22bb-33cc-44dd-55ee-66ff77aa88bb"
                      rule_type: header
                      category: headers
                      config:
                        action: set
                        header_name: X-Frame-Options
                        header_value: SAMEORIGIN
                        always_apply: true
                      sort_order: 0
                      created_at: "2026-01-10T00:00:00Z"
                      updated_at: "2026-01-10T00:00:00Z"
                    - uuid: "22bb33cc-44dd-55ee-66ff-77aa88bb99cc"
                      rule_type: redirect
                      category: redirects
                      config:
                        source: "/old"
                        destination: "https://example.com/new"
                        redirect_type: 301
                        keep_query_string: true
                      sort_order: 1
                      created_at: "2026-01-11T00:00:00Z"
                      updated_at: "2026-01-11T00:00:00Z"
                  counts:
                    headers: 1
                    redirects: 1
                    total: 2
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /sites/{uuid}/snapshots:
    get:
      tags: [Sites]
      summary: List Site Snapshots
      description: >
        Returns snapshots created from this site, paginated. SSH
        keypair references, raw meta, and logs are stripped. The
        `public_url_token` is included only for public snapshots —
        for private snapshots it is null. Requires the `read:sites` scope.
      operationId: sites.snapshots
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            default: 1
            example: 1
        - name: per_page
          in: query
          description: Items per page (default 15, max 100)
          schema:
            type: integer
            default: 15
            maximum: 100
            example: 15
      responses:
        "200":
          description: Paginated list of site snapshots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SiteSnapshotList"
              example:
                success: true
                message: Snapshots retrieved successfully.
                data:
                  items:
                    - uuid: "9f8e7d6c-5b4a-3210-fedc-ba9876543210"
                      name: pre-deploy
                      description: Snapshot before v2 release
                      type: private
                      status: ready
                      size_bytes: 524288000
                      formatted_size: "500 MB"
                      public_url_token: null
                      created_at: "2026-04-01T10:00:00Z"
                      updated_at: "2026-04-01T10:15:00Z"
                  pagination:
                    total: 1
                    per_page: 15
                    current_page: 1
                    last_page: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /sites/{uuid}/cache/settings:
    get:
      tags: [Sites]
      summary: Get Cache Settings
      description: >
        Returns which cache layers are active for the site: page cache
        (full-page or WP cache plugin), object cache (Redis and
        Object Cache Pro), and Cloudflare edge cache. Settings only —
        no cache contents are returned. Requires the `read:sites` scope.
      operationId: sites.cacheSettings
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "200":
          description: Cache settings summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SiteCacheSettings"
              example:
                success: true
                message: Cache settings retrieved successfully.
                data:
                  stack: nginx
                  page_cache:
                    enabled: true
                    source: fullpage
                    plugin: null
                  object_cache:
                    redis: true
                    object_cache_pro: false
                  cloudflare_edge_cache:
                    enabled: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /sites/{uuid}/cache/purge:
    post:
      tags: [Sites]
      summary: Purge Full-Page Cache
      description: >
        Clears the full-page cache for the site. Requires the `write:sites` scope.
      operationId: sites.cache.purge
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "202":
          description: Cache purge dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
              example:
                success: true
                message: Cache purge dispatched
                data: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /sites/{uuid}/cache/purge-all:
    post:
      tags: [Sites]
      summary: Purge All Caches
      description: >
        Purges every supported cache for this site in one call: object cache,
        Cloudflare edge cache (when enabled), Redis object cache, and Object
        Cache Pro (when the plugin integration is present). A failed sub-task
        does not abort the others — inspect `data.caches` to see which queued,
        skipped, or failed. Requires the `write:sites` scope.
      operationId: sites.cache.purge-all
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "202":
          description: Cache purge dispatched for all supported caches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          site:
                            type: object
                            properties:
                              uuid: { type: string, format: uuid }
                              name: { type: string }
                          caches:
                            type: object
                            properties:
                              object_cache: { type: string, enum: [queued, failed, skipped] }
                              cloudflare_edge: { type: string, enum: [queued, failed, skipped] }
                              redis_object_cache: { type: string, enum: [queued, failed, skipped] }
                              object_cache_pro: { type: string, enum: [queued, failed, skipped] }
              example:
                success: true
                message: Cache purge dispatched for all supported caches.
                data:
                  site:
                    uuid: 1a2b3c4d-5e6f-7890-abcd-1234567890ef
                    name: my-wordpress-site
                  caches:
                    object_cache: queued
                    cloudflare_edge: skipped
                    redis_object_cache: queued
                    object_cache_pro: skipped
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/pagespeed/scan:
    post:
      tags: [PageSpeed]
      summary: Trigger PageSpeed Insights Scan
      description: >
        Queues a new PageSpeed Insights run for both mobile and desktop
        strategies. Returns 202 with a `scan_uuid` that links the two
        strategy runs. Returns 409 if a scan is already running for this
        site (within the last 10 minutes).
        After completion, poll `GET /sites/{uuid}/pagespeed` for the
        latest results. Requires the `write:sites` scope and the
        `site:manage-update` team permission.
      operationId: sites.pagespeed.scan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "202":
          description: Scan queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          site:
                            type: object
                            properties:
                              uuid: { type: string, format: uuid }
                              name: { type: string }
                          scan_uuid: { type: string, format: uuid }
                          strategies:
                            type: array
                            items: { type: string, enum: [mobile, desktop] }
                          scan_queued_at:
                            type: string
                            format: date-time
              example:
                success: true
                message: PageSpeed scan queued.
                data:
                  site:
                    uuid: 1a2b3c4d-5e6f-7890-abcd-1234567890ef
                    name: my-wordpress-site
                  scan_uuid: f8a9c2d1-1234-4abc-9def-1234567890ab
                  strategies: [mobile, desktop]
                  scan_queued_at: "2026-05-14T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A scan is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                success: false
                message: "A PageSpeed scan is already running for this site. Please wait or retry in a few minutes."
                data: null

  # ---------------------------------------------------------------------------
  # Vulnerabilities — Slice A PR2 (Phase 2)
  # ---------------------------------------------------------------------------

  /sites/{uuid}/vulnerabilities:
    get:
      tags: [Vulnerabilities]
      summary: List Site Vulnerabilities
      description: >
        Returns a merged inventory of known vulnerabilities affecting the
        specified site. Sources include Patchstack (when the addon is
        enabled) and Wordfence (always available). Ignored entries are
        excluded by default. Requires the `read:sites` scope.
      operationId: sites.vulnerabilities.list
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [all, critical, high, medium, low, unknown]
            default: all
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [all, patchstack, wordfence]
            default: all
        - name: include_ignored
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Vulnerability inventory for the site
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/Vulnerability"
                          pagination:
                            $ref: "#/components/schemas/PaginationMeta"
                          summary:
                            $ref: "#/components/schemas/VulnerabilitiesSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/vulnerabilities/count:
    get:
      tags: [Vulnerabilities]
      summary: Get Site Vulnerability Count by Severity
      description: >
        Returns severity-grouped vulnerability counts (critical/high/medium/low)
        for the site, plus a combined `total` and the `skipped` (ignored) count.
        Counts come from a single source — Patchstack is preferred over Wordfence
        (never both) — and only `insecure` detections are counted. Severity is
        derived from the vulnerability score, so these numbers match the xCloud
        dashboard's Vulnerability panel exactly. Requires the `read:sites` scope.
      operationId: sites.vulnerabilities.count
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "200":
          description: Severity-grouped vulnerability counts for the site
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/VulnerabilityCount"
              example:
                success: true
                message: Success
                data:
                  critical: 0
                  high: 2
                  medium: 4
                  low: 0
                  skipped: 0
                  total: 6
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /ssl-certificates/{uuid}:
    get:
      tags: [SSL Certificates]
      summary: Get SSL Certificate
      description: >
        Returns details for a single SSL certificate addressed by its
        own UUID. The raw certificate body and private key are never
        exposed. Requires the `read:sites` scope.
      operationId: ssl-certificates.show
      security:
        - bearerAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          description: SSL certificate UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSL certificate
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SslCertificate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [SSL Certificates]
      summary: Delete SSL Certificate
      description: >
        Deletes an SSL certificate row by UUID. When the certificate
        is the parent site's currently active SSL provider, the site's
        `ssl_provider` is cleared and nginx is regenerated so HTTPS
        stops being served with that certificate. Historical rows
        (different provider than the active one) are removed without
        touching the served configuration. Requires the `write:sites`
        scope.
      operationId: ssl-certificates.destroy
      security:
        - bearerAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          description: SSL certificate UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSL certificate deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /ssl-certificates/{uuid}/status:
    get:
      tags: [SSL Certificates]
      summary: Get SSL Certificate Status
      description: >
        Returns the live status of a single SSL certificate. Lighter
        than the full `GET /ssl-certificates/{uuid}` shape, intended
        for clients polling after `POST /sites/{uuid}/ssl-certificates`.
        Requires the `read:sites` scope.
      operationId: ssl-certificates.status
      security:
        - bearerAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          description: SSL certificate UUID.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSL certificate status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SslCertificateStatus"
              example:
                success: true
                message: SSL status retrieved successfully.
                data:
                  uuid: "5d5a3c5e-3c5e-4a5e-9d5a-3c5e3c5e3c5e"
                  provider: xcloud
                  status: obtained
                  label: Installed
                  is_installed: true
                  is_in_progress: false
                  expires_at: "2026-08-10T00:00:00Z"
                  updated_at: "2026-05-10T03:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /vulnerabilities:
    get:
      tags: [Vulnerabilities]
      summary: Team-Wide Vulnerability Rollup
      description: >
        Aggregates vulnerabilities across every site in the current team.
        Each item includes a `site` context object. Ideal for fleet audits.
        Ignored entries are excluded by default. Requires the `read:sites`
        scope.
      operationId: vulnerabilities.index
      security:
        - bearerAuth: []
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [all, critical, high, medium, low, unknown]
            default: all
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [all, patchstack, wordfence]
            default: all
        - name: include_ignored
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Team-wide vulnerability rollup
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              allOf:
                                - $ref: "#/components/schemas/Vulnerability"
                                - type: object
                                  required: [site]
                                  properties:
                                    site:
                                      $ref: "#/components/schemas/VulnerabilitySiteContext"
                          pagination:
                            $ref: "#/components/schemas/PaginationMeta"
                          summary:
                            allOf:
                              - $ref: "#/components/schemas/VulnerabilitiesSummary"
                              - type: object
                                properties:
                                  site_count_with_vulnerabilities:
                                    type: integer
                                    example: 12
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Vulnerability write actions — Phase 3 PR6
  # ---------------------------------------------------------------------------

  /sites/{uuid}/vulnerability-scan:
    post:
      tags: [Vulnerabilities]
      summary: Trigger Vulnerability Rescan
      description: >
        Queues an asynchronous WordPress item refresh and recomputes
        Wordfence vulnerability matches for the site. Returns 202 — completion
        is asynchronous. After scanning, poll
        `GET /sites/{uuid}/vulnerabilities` to see updated results.
        Requires the `write:sites` scope and the `site:manage-update` team
        permission.
      operationId: sites.vulnerability-scan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "202":
          description: Scan queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          site:
                            type: object
                            properties:
                              uuid: { type: string, format: uuid }
                              name: { type: string }
                          scan_queued_at:
                            type: string
                            format: date-time
              example:
                success: true
                message: "Vulnerability scan queued."
                data:
                  site:
                    uuid: 1a2b3c4d-5e6f-7890-abcd-1234567890ef
                    name: my-wordpress-site
                  scan_queued_at: "2026-05-13T10:30:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/vulnerabilities/{vulnerabilityUuid}/ignore:
    post:
      tags: [Vulnerabilities]
      summary: Ignore Vulnerability
      description: >
        Marks a single vulnerability (Wordfence or Patchstack source) as ignored
        for this site. Ignored entries are hidden from default listings.
        Idempotent — re-ignoring an already-ignored entry still returns 200.
        Requires the `write:sites` scope and the `site:manage-update` team
        permission.
      operationId: sites.vulnerabilities.ignore
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
        - $ref: "#/components/parameters/VulnerabilityUuid"
      responses:
        "200":
          description: Vulnerability ignored
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/VulnerabilityIgnoreResult"
              example:
                success: true
                message: "Vulnerability ignored."
                data:
                  vulnerability:
                    uuid: 8c5d7e8a-1234-4abc-9def-1234567890ab
                    source: wordfence
                    slug: woocommerce
                    ignored: true
                  site:
                    uuid: 1a2b3c4d-5e6f-7890-abcd-1234567890ef
                    name: my-wordpress-site
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Vulnerabilities]
      summary: Unignore Vulnerability
      description: >
        Clears the `ignored` flag on a single vulnerability for this site.
        Idempotent. Requires the `write:sites` scope and the
        `site:manage-update` team permission.
      operationId: sites.vulnerabilities.unignore
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
        - $ref: "#/components/parameters/VulnerabilityUuid"
      responses:
        "200":
          description: Vulnerability unignored
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/VulnerabilityIgnoreResult"
              example:
                success: true
                message: "Vulnerability unignored."
                data:
                  vulnerability:
                    uuid: 8c5d7e8a-1234-4abc-9def-1234567890ab
                    source: wordfence
                    slug: woocommerce
                    ignored: false
                  site:
                    uuid: 1a2b3c4d-5e6f-7890-abcd-1234567890ef
                    name: my-wordpress-site
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # PageSpeed Insights — Slice A PR3 (Phase 2)
  # ---------------------------------------------------------------------------

  /sites/{uuid}/pagespeed:
    get:
      tags: [PageSpeed]
      summary: Latest PageSpeed Snapshot
      description: >
        Returns the most recent COMPLETED PageSpeed Insights run for each
        strategy (mobile + desktop). Either or both may be `null` if the
        site has no completed runs. Requires the `read:sites` scope and
        the `site:manage-update` team permission.
      operationId: sites.pagespeed.latest
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "200":
          description: Latest snapshot per strategy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          mobile:
                            oneOf:
                              - $ref: "#/components/schemas/PagespeedRun"
                              - type: "null"
                          desktop:
                            oneOf:
                              - $ref: "#/components/schemas/PagespeedRun"
                              - type: "null"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /sites/{uuid}/pagespeed/history:
    get:
      tags: [PageSpeed]
      summary: PageSpeed History
      description: >
        Paginated history of COMPLETED PageSpeed Insights runs for the site,
        ordered newest-first. Optional `strategy` filter (mobile|desktop).
        Requires the `read:sites` scope and the `site:manage-update` team
        permission.
      operationId: sites.pagespeed.history
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
        - in: query
          name: strategy
          required: false
          schema:
            type: string
            enum: [mobile, desktop]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Historical PageSpeed runs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/PagespeedRun"
                          pagination:
                            $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # WordPress write actions — Phase 3 PR4
  # ---------------------------------------------------------------------------

  /sites/{uuid}/wordpress/update:
    post:
      tags: [WordPress Actions]
      summary: Update WordPress Items
      description: >
        Queues an update operation for one or more WordPress plugins, themes,
        or core on the specified site. Asynchronous — returns 202 with an
        operation UUID that can be polled for completion (operation tracking
        endpoints land in a later PR). Items already updating or with no
        update available are reported under `skipped_items`.
        Requires the `write:sites` scope and the `site:manage-update`
        team permission.
      operationId: sites.wordpress.update
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordPressUpdateRequest"
      responses:
        "202":
          description: Update queued for asynchronous processing
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WordPressUpdateOperation"
              example:
                success: true
                message: "WordPress update queued."
                data:
                  operation:
                    uuid: 8c5d7e8a-1234-4abc-9def-1234567890ab
                    status: queued
                    operation_type: update
                  queued_items:
                    - slug: woocommerce
                      title: WooCommerce
                      type: plugin
                      current_version: "8.3.1"
                      available_version: "8.5.0"
                  skipped_items:
                    - slug: yoast-seo
                      reason: no_update_available
                  backup_before_update: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/wordpress/activate:
    post:
      tags: [WordPress Actions]
      summary: Activate WordPress Plugins or Themes
      description: >
        Queues an activate operation for one or more WordPress plugins or themes
        on the specified site. Asynchronous — returns 202 with an operation
        UUID. Items that cannot be activated (already active, must-use, or
        dropin) are reported under `skipped_items`.
        Requires the `write:sites` scope and the `site:manage-update` team
        permission.
      operationId: sites.wordpress.activate
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordPressActivateRequest"
      responses:
        "202":
          description: Activate queued for asynchronous processing
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WordPressToggleOperation"
              example:
                success: true
                message: "WordPress activation queued."
                data:
                  operation:
                    uuid: 8c5d7e8a-1234-4abc-9def-1234567890ab
                    status: queued
                    operation_type: toggle
                    action: activate
                  queued_items:
                    - slug: woocommerce
                      title: WooCommerce
                      type: plugin
                  skipped_items:
                    - slug: akismet
                      reason: already_active
                  backup_before_action: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/wordpress/refresh:
    post:
      tags: [WordPress Actions]
      summary: Refresh WordPress Items
      description: >
        Queues a background scan of the site that re-reads WordPress core,
        plugins, and themes from the server. Use after manual changes outside
        xCloud. Returns 202 — completion is asynchronous; poll
        `GET /sites/{uuid}/wordpress/updates` afterwards.
        Requires the `write:sites` scope and the `site:manage-update` team
        permission.
      operationId: sites.wordpress.refresh
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "202":
          description: Refresh queued for asynchronous processing
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          site:
                            type: object
                            properties:
                              uuid:
                                type: string
                                format: uuid
                              name:
                                type: string
              example:
                success: true
                message: "WordPress refresh queued."
                data:
                  site:
                    uuid: 1a2b3c4d-5e6f-7890-abcd-1234567890ef
                    name: my-wordpress-site
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/wp-debug:
    post:
      tags: [WordPress Actions]
      summary: Toggle WP_DEBUG
      description: >
        Updates the site's `wp-config.php` to enable or disable `WP_DEBUG`.
        Synchronous — the change is applied during the request and the
        response reflects the final state. Returns 200 on success,
        422 when the server-side script fails.
        Requires the `write:sites` scope and the `site:manage-update` team
        permission.
      operationId: sites.wp-debug
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WpDebugRequest"
      responses:
        "200":
          description: WP_DEBUG toggled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          site:
                            type: object
                            properties:
                              uuid:
                                type: string
                                format: uuid
                              name:
                                type: string
                          wp_debug_enabled:
                            type: boolean
              example:
                success: true
                message: "WP_DEBUG enabled."
                data:
                  site:
                    uuid: 1a2b3c4d-5e6f-7890-abcd-1234567890ef
                    name: my-wordpress-site
                  wp_debug_enabled: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/magic-login:
    post:
      tags: [WordPress Actions]
      summary: Generate Magic Login URL
      description: >
        Returns a short-lived URL that logs the WordPress admin into the
        site's `/wp-admin` dashboard without a password. Token TTL is
        10 minutes. Synchronous — the first call uploads the xCloud
        magic-login WP plugin over SSH (subsequent calls skip when
        plugin status is healthy).

        Rate-limited to 30 requests per minute per user. Requires the
        `write:sites` scope and the `site:magic-login` permission.
        Delegated logins (`login_as`) additionally require the
        `site:access-magic-login` team permission.
      operationId: sites.magic-login
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                login_as:
                  type: string
                  maxLength: 64
                  nullable: true
                  description: >
                    Optional WordPress username to log in as. When
                    omitted, logs in as the site's admin user. Requires
                    the caller's team membership to grant the
                    `site:access-magic-login` permission.
                  example: editor_user
      responses:
        "200":
          description: Magic login URL generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MagicLoginResult" }
              example:
                success: true
                message: "Magic login URL generated"
                data:
                  url: "https://example.com/wp-admin/wp-login.php?xcloud_magic_login_token=eyJ...&auth_token=Xa3p9q&v=1742212211"
                  expires_at: "2026-05-20T14:50:00Z"
                  admin_user: "admin"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden — caller lacks site:magic-login or delegation permission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Site is not WordPress, or magic login is disabled on the server
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "429":
          description: Rate limit exceeded (30/min/user)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "502":
          description: Failed to provision magic login plugin on the site
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          description: Server is not connected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

# =============================================================================
# Components
# =============================================================================

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: >
        Sanctum personal access token. Create tokens at `/user/api-tokens`.
        Pass as: `Authorization: Bearer <token>`

  parameters:
    ServerUuid:
      name: uuid
      in: path
      required: true
      description: UUID of the server
      schema:
        type: string
        format: uuid
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

    SiteUuid:
      name: uuid
      in: path
      required: true
      description: UUID of the site
      schema:
        type: string
        format: uuid
        example: b2c3d4e5-f6a7-8901-bcde-f12345678901

    SudoUserUuid:
      name: sudo_user_uuid
      in: path
      required: true
      description: UUID of the sudo user
      schema:
        type: string
        format: uuid
        example: c3d4e5f6-a7b8-9012-cdef-234567890123

    VulnerabilityUuid:
      name: vulnerabilityUuid
      in: path
      required: true
      description: >
        UUID of the vulnerability (either a Wordfence `vulnerability_sites` row
        or a Patchstack `patchstack_vulnerability_sites` row). The UUID is
        returned by `GET /sites/{uuid}/vulnerabilities` as `item.uuid`.
      schema:
        type: string
        format: uuid
        example: 8c5d7e8a-1234-4abc-9def-1234567890ab

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            message: Unauthenticated.
            data: null

    Forbidden:
      description: Token lacks the required scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            message: This action is unauthorized. Your token is missing the required scope.
            data: null

    NotFound:
      description: Resource not found or not accessible to your team
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            message: Not found.
            data: null

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorEnvelope"
              - type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
          example:
            success: false
            message: The given data was invalid.
            data: null
            errors:
              domain: ["The domain field is required when mode is live."]

  schemas:

    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully.
        data:
          nullable: true

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: An error occurred.
        data:
          nullable: true

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
        per_page:
          type: integer
          example: 15
        total:
          type: integer
          example: 72

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1234
        name:
          type: string
          example: Jane Smith
        email:
          type: string
          format: email
          example: jane@example.com
        current_team_id:
          type: integer
          example: 5678
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    ApiToken:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: "8c1f3a89-2c4e-4a73-9d4c-8b1f2a3d4e5f"
        name:
          type: string
          example: My CI Token
        abilities:
          type: array
          items:
            type: string
          example: ["read:servers", "read:sites"]
        team_uuid:
          type: string
          format: uuid
          nullable: true
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        team_name:
          type: string
          nullable: true
          example: Acme
        last_used_at:
          type: string
          format: date-time
          nullable: true
          example: "2025-03-10T08:22:00Z"
        created_at:
          type: string
          format: date-time
          example: "2025-01-20T14:00:00Z"

    CloudflareIntegration:
      type: object
      properties:
        id:
          type: string
          example: cf_1
        name:
          type: string
          example: Jane's Cloudflare
        email:
          type: string
          format: email
          example: jane@example.com
        zone_count:
          type: integer
          example: 12

    ServerSummary:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          example: xcloud
        status:
          type: string
          enum: [active, inactive, provisioning, failed]
          example: active
        status_readable:
          type: string
          nullable: true
          description: Human-readable, title-cased status label.
          example: Provisioned
        ip_address:
          type: string
          format: ipv4
          example: 203.0.113.42
        provider:
          type: string
          example: digitalocean
        stack:
          type: string
          example: lemp
        php_version:
          type: string
          example: "8.2"
        region:
          type: string
          example: nyc1
        created_at:
          type: string
          format: date-time
          example: "2024-06-01T09:00:00Z"
        dashboard_url:
          type: string
          format: uri
          description: >
            Browser-openable deep link to the xCloud server dashboard.
            Requires an active xCloud login session; redirects to login
            if not authenticated. Returns 404 if the caller's user does
            not have view access on the server. Honors white-label
            branded domains.
          example: "https://app.xcloud.host/server/a1b2c3d4-e5f6-7890-abcd-ef1234567890/dashboard"

    ServerDetail:
      allOf:
        - $ref: "#/components/schemas/ServerSummary"
        - type: object
          properties:
            ubuntu_version:
              type: string
              example: "24.04"
            node_version:
              type: string
              nullable: true
              example: "20"
            database_type:
              type: string
              nullable: true
              example: mysql
            monitoring:
              type: boolean
              example: true

    PaginatedServers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ServerSummary"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

#     Database:
#       type: object
#       properties:
#         name:
#           type: string
#           example: wp_example_com
#         user:
#           type: string
#           example: wp_example
#         server_uuid:
#           type: string
#           format: uuid
#           example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
# 
#     DatabaseUser:
#       type: object
#       properties:
#         username:
#           type: string
#           example: app_user
#         databases:
#           type: array
#           description: Databases this user can access (may be empty).
#           items:
#             type: string
#           example: [analytics_db, logs_db]

    ServerSnapshot:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: "9f8e7d6c-5b4a-3210-fedc-ba9876543210"
        name:
          type: string
          example: pre-deploy
        description:
          type: string
          nullable: true
          example: Snapshot before v2 release
        type:
          type: string
          nullable: true
          enum: [public, private]
          example: private
        status:
          type: string
          nullable: true
          enum: [verifying, creating, ready, failed]
          example: ready
        size_bytes:
          type: integer
          example: 524288000
        formatted_size:
          type: string
          example: "500 MB"
        public_url_token:
          type: string
          nullable: true
          description: Share token for public snapshots; null for private snapshots.
          example: null
        source_site_uuid:
          type: string
          format: uuid
          nullable: true
          description: UUID of the site this snapshot was taken from.
          example: "11aa22bb-33cc-44dd-55ee-66ff77aa88bb"
        source_site_name:
          type: string
          nullable: true
          example: example.com
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    ServerSnapshotList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ServerSnapshot"
        pagination:
          type: object
          properties:
            total:
              type: integer
              example: 1
            per_page:
              type: integer
              example: 15
            current_page:
              type: integer
              example: 1
            last_page:
              type: integer
              example: 1

    ServerMonitoringHistory:
      type: object
      properties:
        server:
          type: object
          properties:
            uuid:
              type: string
              format: uuid
            name:
              type: string
        range:
          type: string
          enum: [24h, 7d]
          example: 7d
        samples:
          type: array
          items:
            type: object
            properties:
              cpu_usage:
                type: number
                format: float
                example: 12.4
              ram_usage:
                type: number
                format: float
                example: 68.1
              disk_usage:
