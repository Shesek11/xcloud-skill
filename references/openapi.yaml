    CreateWordPressSiteRequest:
      type: object
      required: [mode, title]
      properties:
        mode:
          type: string
          enum: [live, demo]
          description: >
            `live` creates a real production site with a custom domain.
            `demo` creates a temporary site with an auto-generated xcloud.host subdomain.
          example: live
        domain:
          type: string
          description: Primary domain name. Required when `mode` is `live`.
          example: example.com
        title:
          type: string
          maxLength: 256
          description: WordPress site title.
          example: My Awesome Site
        php_version:
          type: string
          nullable: true
          description: >
            PHP version to use. If the version is not already installed on the server,
            it will be installed automatically. Available versions depend on the server type.
            When omitted, defaults to the server's current PHP version.
          example: "8.2"
        ssl:
          type: object
          description: SSL configuration. Required when `mode` is `live`.
          properties:
            provider:
              type: string
              enum: [xcloud, letsencrypt, cloudflare]
              description: >
                SSL provider. `xcloud` uses xCloud's shared SSL. `letsencrypt` issues a
                free Let's Encrypt cert. `cloudflare` proxies through Cloudflare.
              example: letsencrypt
        wordpress_version:
          type: string
          description: WordPress version to install. Defaults to latest stable.
          example: "6.7"
        multisite:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            type:
              type: string
              enum: [subdirectory, subdomain]
              default: subdirectory
        blueprint_uuid:
          type: string
          format: uuid
          description: >
            UUID of a blueprint to apply after installation. Get available
            blueprints from `GET /blueprints`. Mutually exclusive with `snapshot_uuid`.
          example: b1c2d3e4-f5a6-7890-bcde-f12345678901
        snapshot_uuid:
          type: string
          format: uuid
          description: UUID of a site snapshot to restore from.
          example: d4e5f6a7-b8c9-0123-defa-234567890123
        cache:
          type: object
          description: "Cache configuration. On Nginx servers, full-page cache and Redis object cache are separate plugins. On OpenLiteSpeed servers, enabling full-page cache installs LiteSpeed Cache plugin which includes built-in object caching."
          properties:
            full_page:
              type: boolean
              default: false
              description: "Enable full-page caching. Nginx: installs FastCGI cache. OpenLiteSpeed: installs LiteSpeed Cache plugin."
            object_cache:
              type: boolean
              default: false
              description: "Enable object caching. Nginx: installs Redis Object Cache plugin. OpenLiteSpeed: included with LiteSpeed Cache."
        cloudflare:
          type: boolean
          default: false
          description: >
            Auto-discover and configure Cloudflare for the domain (requires a
            connected Cloudflare integration with the domain's zone).
        additional_domains:
          type: array
          items:
            type: string
          description: Additional domains to point to this site.
          example: ["www.example.com", "shop.example.com"]
        deploy_script:
          type: string
          description: Custom shell script to run after WordPress installation.
          example: "cd $SITE_PATH && wp plugin install woocommerce --activate"
        tags:
          type: array
          items:
            type: string
          description: Tags to apply to the site for organization.
          example: ["production", "client-site"]

    CreatedWordPressSite:
      type: object
