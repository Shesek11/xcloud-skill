        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /sites/{uuid}/ssl-certificates:
    get:
      tags: [Sites]
      summary: List SSL Certificates
      description: >
        Returns all SSL certificates attached to the site, regardless of
        provider. Raw certificate body and private key are never included.
        Requires the `read:sites` scope.
      operationId: sites.sslCertificates
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      responses:
        "200":
          description: List of SSL certificates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SslCertificateList"
              example:
                success: true
                message: SSL certificates retrieved successfully.
                data:
                  items:
                    - uuid: "5d5a3c5e-3c5e-4a5e-9d5a-3c5e3c5e3c5e"
                      provider: xcloud
                      status: installed
                      obtained_from: letsencrypt
                      expires_at: "2026-08-10T00:00:00Z"
                      renewal_attempt_at: "2026-05-10T03:00:00Z"
                      hostnames: ["example.com", "www.example.com"]
                      is_installed: true
                      created_at: "2025-12-10T00:00:00Z"
                      updated_at: "2026-05-10T03:00:00Z"
                  count: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Sites]
      summary: Create SSL Certificate
      description: >
        Provisions an SSL certificate for the site. Three providers:
          - **xcloud** — Let's Encrypt via xCloud. Requires DNS pointing
            at the server, OR an active Cloudflare integration when
            migrating from Cloudflare back to xCloud.
          - **custom** — user-supplied certificate body + private key.
          - **cloudflare** — uses the team's Cloudflare integration that
            owns the domain's zone. Mapped server-side to the
            multi-domain CF SSL architecture.

        Switching providers on an already-SSL'd site requires
        `force: true`; the previous provider's row is retained as audit
        history. Returns 202 when the job is dispatched, 409 when
        generation is already in flight, 422 for pre-flight failures
        (invalid provider, missing custom cert, DNS not pointing at
        server, no Cloudflare integration owns the zone, strict-switch
        without force). Requires the `write:sites` scope.
      operationId: sites.sslCertificates.create
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSslCertificateRequest"
            examples:
              xcloud:
                summary: Generate an xCloud-managed (Let's Encrypt) certificate
                value:
                  provider: xcloud
              custom:
                summary: Upload a custom certificate
                value:
                  provider: custom
                  certificate: "-----BEGIN CERTIFICATE-----\nMIID...\n-----END CERTIFICATE-----"
                  private_key: "-----BEGIN PRIVATE KEY-----\nMIIE...\n-----END PRIVATE KEY-----"
              cloudflare:
                summary: Use the team's Cloudflare integration
                value:
                  provider: cloudflare
              switch_with_force:
                summary: Switch providers (e.g. xcloud → cloudflare)
                value:
                  provider: cloudflare
                  force: true
              wordpress_with_search_replace:
                summary: WordPress site adopting HTTPS for the first time
                value:
                  provider: xcloud
                  ssl_search_replace: true
      responses:
        "202":
          description: SSL certificate generation queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreateSslCertificateResponse"
              example:
                success: true
                message: SSL certificate generation queued
                data:
                  site:
                    uuid: "11aa22bb-33cc-44dd-55ee-66ff77aa88bb"
                    name: example.com
                  provider: xcloud
                  previous_provider: cloudflare
                  status: queued
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: SSL generation already in progress (an existing certificate is still in `new` or `obtained` status).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: |
            Pre-flight failure. Possible reasons:
              - Invalid `provider` value.
              - Custom provider with missing `certificate` / `private_key`.
              - xcloud provider but DNS does not resolve to the server (and no Cloudflare migration in progress).
              - cloudflare provider but no team Cloudflare integration owns the domain's zone.
              - Different provider already configured and `force: true` not passed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /sites/{uuid}/ssl/renew:
    post:
      tags: [Sites]
      summary: Renew SSL Certificate
      description: >
        Queues a renewal of the site's xCloud-managed (Let's Encrypt) SSL
        certificate. Returns 202 immediately — completion is asynchronous.
        Custom certificates and Cloudflare SSL are not eligible (managed
        outside xCloud).
        By default the underlying job only renews certificates expiring
        within 7 days. Pass `force: true` to bypass that guard and force a
        renewal regardless of remaining lifetime.
        Requires the `write:sites` scope and the `site:manage-ssl` team
        permission.
      operationId: sites.ssl.renew
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                  description: When true, skip the "must expire within 7 days" guard.
      responses:
        "202":
          description: Renewal queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          site:
                            type: object
                            properties:
                              uuid: { type: string, format: uuid }
                              name: { type: string }
                          certificate:
                            type: object
                            properties:
                              uuid: { type: string, format: uuid }
                              provider: { type: string, example: xcloud }
                              status: { type: string, example: installed }
                              expires_at:
                                type: string
                                format: date-time
                                nullable: true
                          force: { type: boolean }
                          renew_queued_at:
                            type: string
                            format: date-time
              example:
                success: true
                message: SSL renewal queued.
                data:
                  site:
                    uuid: 1a2b3c4d-5e6f-7890-abcd-1234567890ef
                    name: my-wordpress-site
                  certificate:
                    uuid: 9c8b7a6d-1111-2222-3333-444455556666
                    provider: xcloud
                    status: installed
                    expires_at: "2026-08-01T00:00:00Z"
                  force: false
                  renew_queued_at: "2026-05-14T10:30:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

