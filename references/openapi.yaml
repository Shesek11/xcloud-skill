  /sites/{uuid}/access-logs:
    get:
      tags: [Sites]
      summary: Site Access Logs
      description: >
        Reads the live access log from the site's web server and returns parsed
        entries. The path is stack-aware — for nginx stacks it reads the nginx
        access log, for OpenLiteSpeed stacks it reads the LiteSpeed access log.
        The optional `type` parameter forces a specific source (`nginx`, `lsws`,
        or `access` which is stack-aware default).
        Note: this endpoint reads the log file over SSH on each call and can be
        slow on very large logs. Use `limit` to bound entry count.
        Requires the `read:sites` scope and the `site:manage-logs` team
        permission.
      operationId: sites.access-logs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SiteUuid"
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [access, nginx, lsws]
            default: access
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
      responses:
        "200":
          description: Parsed access log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          site:
                            type: object
                            properties:
                              uuid: { type: string, format: uuid }
                              name: { type: string }
                          type: { type: string, enum: [access, nginx, lsws] }
                          limit: { type: integer }
                          entry_count: { type: integer }
                          entries:
                            type: array
                            items:
                              type: object
                              properties:
                                log_type: { type: string, nullable: true, example: access }
                                ip: { type: string, nullable: true, example: "192.168.1.1" }
                                user: { type: string, nullable: true }
                                datetime: { type: string, nullable: true, example: "13/May/2026:09:00:00 +0000" }
                                method: { type: string, nullable: true, example: GET }
                                path: { type: string, nullable: true, example: "/index.php" }
                                protocol: { type: string, nullable: true, example: "HTTP/1.1" }
                                status_code: { type: integer, nullable: true, example: 200 }
                                status_class: { type: string, nullable: true, example: "2xx" }
                                bytes: { type: integer, nullable: true, example: 1024 }
                                referer: { type: string, nullable: true }
                                user_agent: { type: string, nullable: true }
                                is_bot: { type: boolean, example: false }
                                bot_name: { type: string, nullable: true }
                                error_level: { type: string, nullable: true }
                                message: { type: string, nullable: true }
                                raw: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sites/{uuid}/events:
