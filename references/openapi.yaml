                    current_page: 1
                    last_page: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Sites]
      summary: Create Site Cron Job
      description: >
        Creates a site-scoped cron job; the OS user is forced to the
        site's site_user. Installs the cron synchronously over SSH.
        Requires the `write:sites` scope and the
        `server:cron-job` permission.
      operationId: sites.cron-jobs.create
      security:
        - bearerAuth: []
