          type: string
          format: date-time
          example: "2025-03-14T02:00:00Z"

    SiteEvent:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: "9b1f2a3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d"
