        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SiteCronJobInput" }
      responses:
        "200":
          description: Cron job updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
