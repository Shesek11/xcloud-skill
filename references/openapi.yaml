                success: true
                message: Cron jobs retrieved successfully.
                data:
                  items:
                    - uuid: "1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
                      command: "php /var/www/example.com/artisan schedule:run"
                      user: xcloud_example
                      frequency: minutely
                      frequency_label: "Every Minute"
                      pattern: "* * * * *"
                      status: active
